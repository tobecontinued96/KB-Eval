# Alembic configuration for Dify-KB-Eval.
#
# NOTE: keep this file ASCII-only. Alembic reads it via configparser
# using the platform default encoding, which on Windows is GBK and
# will crash on any UTF-8 byte. Put non-ASCII explanations in env.py /
# the revision docstrings instead.
#
# Conventions
# ------------
# * ``sqlalchemy.url`` is intentionally left blank. ``env.py`` reads
#   the same ``$DATABASE_URL`` resolution chain as
#   ``backend.db.session`` -- env var first, then ``.env`` in the
#   repo root -- so the migration tool and the FastAPI app can never
#   disagree about which DB they point at.
# * Migrations live under ``backend/alembic/versions/``. The
#   ``prepend_sys_path`` below puts the repo root on ``sys.path`` so
#   ``env.py`` can ``import backend.db.base`` without a packaging
#   dance.
# * ``timezone = UTC`` keeps autogenerated timestamps comparable to
#   ``utcnow()`` used elsewhere in the codebase.

[alembic]
script_location = backend/alembic
prepend_sys_path = .
timezone = UTC

# File template: <rev_id>_<slug>.py. ``rev_id`` is auto-assigned by Alembic
# (a 12-char hex), and the slug is what the dev passes to
# ``alembic revision -m "..."``.
file_template = %%(rev)s_%%(slug)s

# Append new revisions to the end of the versions directory.
version_path_separator = os
# Use the default ``os`` separator (i.e. one file per revision, no
# branch labels) -- we don't run multi-branch migrations yet.

[post_write_hooks]
# Optional: run ``ruff format`` on every new revision so contributors
# don't have to remember. Disabled by default to avoid surprising devs
# whose ``ruff`` isn't installed; flip to ``true`` once it's universal.
# hooks = ruff format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
